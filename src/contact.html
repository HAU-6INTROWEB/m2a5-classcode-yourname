<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Curbside Thai - Contact</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="index.html">Curbside Thai</a>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1 class="page-title">Find us</h1>

    <section class="contact-row">
      <div class="contact-info">
        <h2>Where and when</h2>
        <p>Corner of University Ave and 5th Street.</p>
        <ul class="hours">
          <li>Monday to Friday: 11am - 2pm</li>
          <li>Saturday: 5pm - 9pm</li>
          <li>Sunday: closed</li>
        </ul>
        <p>Call us: 0917 000 0000</p>
      </div>

      <form class="contact-form" action="#" method="post">
        <h2>Send a message</h2>
        <label for="name">Your name</label>
        <input id="name" name="name" type="text">

        <label for="email">Your email</label>
        <input id="email" name="email" type="email">

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="4"></textarea>

        <button type="submit" class="button">Send</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Curbside Thai - find us on campus, Monday to Friday, 11am to 2pm.</p>
    </div>
  </footer>
</body>
</html>
